name: Deploy to GitHub Pages

on:
  # 當推播至 main 分支時觸發 (如果您的預設分支是 master，請將下方改為 master)
  push:
    branches:
      - main

# 設定 GITHUB_TOKEN 的權限，以允許部署至 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允許同時只有一個部署任務進行，避免衝突
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 負責建立 (Build) 靜態檔案的工作
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite 預設輸出的資料夾名稱

  # 負責部署 (Deploy) 至 GitHub Pages 的工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4